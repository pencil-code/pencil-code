# Cray suite: FORTRAN-compiler

%section Makefile
	FC = ftn
	F77 = $(FC)
        #-M 878 is to suppress the most annoying compiler warning on the planet
	FFLAGS += -J . -M 878
# add for huge setups: -h pic  -Wl,--no-relax
	FFLAGS_DOUBLE = -s real64 -fPIC
        FFLAG_HEAP_ALLOC = -h heap_allocate
        OMPFFLAGS = -fopenmp   #-h thread1
	LDFLAGS_HELPER += -h dynamic
	LDFLAGS += -Wl,--no-relax
        CFLAGS  += -fPIC
	OMPFFLAGS = -homp
	OMPLFLAGS = -fopenmp
	MODULE_NAME_ORDER=CRAY
        MODULE_PREFIX =
        MODULE_INFIX  = $
        MODULE_SUFFIX = _
%endsection Makefile
%section environment
	MODULE_NAME_ORDER=CRAY
        MODULE_PREFIX =
        MODULE_INFIX  = $
        MODULE_SUFFIX = _
%endsection environment

%section environment
	MODULE_PREFIX=
	MODULE_INFIX='$'
	MODULE_SUFFIX=_
%endsection environment
